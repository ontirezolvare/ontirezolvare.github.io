<!DOCTYPE>
<html>
    <head>
        <Style>
#zona{
    text-align: center;
}
#zonaz{
    background-color:cornflowerblue;
    text-align: center;
    display: flex;
    justify-content: space-between;
    padding: 10px;
}
#zonaz a{       /* css pentru linkruile din zona2 */
    background-color: pink;
    padding: 4px 10px;
    border-radius: 10px; /* colturi frumoase */
}
#Zona3 {
    width: 80%;
    margin: auto;
}

.galerie {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 20px; 
}

.poza {
    position: relative;
    text-align: center;
}

.poza img {
    width: 100%;
    height: 300px;
    object-fit: cover;
    border: 10px double blue; 
}

.poza span {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    background: rgba(0,0,0,0.6);
    color: white;
    padding: 5px;
    opacity: 0;
    transition: 0.3s;
}

.poza:hover span {
    opacity: 1;
}
#zona4{
    overflow: hidden;
    white-space: nowrap;
}
#zona4 h4 {
    display: inline-block;
    animation: miscare 5s linear infinite;
}

@keyframes miscare {
    0% {
        transform: translateX(-100%);
    }
    100% {
        transform: translateX(100%);
    }
}
        </Style>
    </head>
