<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <title>Rezolvare ONTI</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
        }

        h1 {
            text-align: center;
        }

        .section {
            margin: 10px 0;
        }

        button {
            margin: 5px;
            padding: 8px 12px;
            cursor: pointer;
        }

        .hidden {
            display: none;
        }

        .container {
            margin-left: 20px;
        }
    </style>
</head>
<body>

<h1>Rezolvare ONTI</h1>

<div id="years"></div>

<script>
const years = [2019, 2022, 2023, 2024, 2025];

const container = document.getElementById("years");

years.forEach(year => {
    let yearDiv = document.createElement("div");
    yearDiv.className = "section";

    let yearBtn = document.createElement("button");
    yearBtn.textContent = year;

    let classDiv = document.createElement("div");
    classDiv.className = "container hidden";

    // Clasa 9A
    let classBtn = document.createElement("button");
    classBtn.textContent = "Clasa 9A";

    let examDiv = document.createElement("div");
    examDiv.className = "container hidden";

    ["Judeteana", "Nationala"].forEach(type => {
        let typeBtn = document.createElement("button");
        typeBtn.textContent = type;

        let resourcesDiv = document.createElement("div");
        resourcesDiv.className = "container hidden";

        ["Resurse", "Subiect", "Rezolvare", "Barem"].forEach(res => {
            let resBtn = document.createElement("button");
            resBtn.textContent = res;

            // Special behavior for Rezolvare
            if (res === "Rezolvare") {
                let subDiv = document.createElement("div");
                subDiv.className = "container hidden";

                for (let i = 1; i <= 6; i++) {
                    let subBtn = document.createElement("button");
                    subBtn.textContent = "Subiect " + i;

                    if (i === 6) {
                        subBtn.onclick = () => {
                            window.location.href = "site/index.html"; // your folder
                        };
                    }

                    subDiv.appendChild(subBtn);
                }

                resBtn.onclick = () => {
                    subDiv.classList.toggle("hidden");
                };

                resourcesDiv.appendChild(resBtn);
                resourcesDiv.appendChild(subDiv);
            } else {
                resBtn.onclick = () => {
                    alert(res + " pentru " + type + " " + year);
                };
                resourcesDiv.appendChild(resBtn);
            }
        });

        typeBtn.onclick = () => {
            resourcesDiv.classList.toggle("hidden");
        };

        examDiv.appendChild(typeBtn);
        examDiv.appendChild(resourcesDiv);
    });

    classBtn.onclick = () => {
        examDiv.classList.toggle("hidden");
    };

    classDiv.appendChild(classBtn);
    classDiv.appendChild(examDiv);

    yearBtn.onclick = () => {
        classDiv.classList.toggle("hidden");
    };

    yearDiv.appendChild(yearBtn);
    yearDiv.appendChild(classDiv);

    container.appendChild(yearDiv);
});
</script>

</body>
</html>
